<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WJ Beta Checklist</title>
    <meta name="description" content="Beta test checklist for Wizard Journey">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    
    <main class="container">
        <header>
            <h1 class="magical-text">WJ Beta Checklist</h1>
            <p class="subtitle">Track your beta testing progress</p>
        </header>

        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="progress-text" id="progress-text">0 / 0 completed</div>

        <ul class="checklist" id="checklist">
            <!-- Checklist items will be populated by JS -->
        </ul>

        <button class="reset-btn" id="reset-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 5 4 4"/><path d="M13 7 8.7 2.7a2.41 2.41 0 0 0-3.4 0L2.7 5.3a2.41 2.41 0 0 0 0 3.4L7 13"/><path d="m8 11 11.3 11.3c.9.9 2.5.9 3.4 0l0 0c.9-.9.9-2.5 0-3.4L11.4 7.6"/><path d="m16 11 3-3"/></svg>
            Reset Progress
        </button>
    </main>

    <script src="script.js"></script>
</body>
</html>
